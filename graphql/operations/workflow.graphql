# Workflows - automation workflows

query GetWorkflow($id: ID!) {
  workflow(id: $id) {
    id
    name
    kind
    enabled
    global
    readOnly
    definition
    createdAt
    updatedAt
  }
}

query ListWorkflows {
  workflows {
    id
    name
    kind
    enabled
    global
    readOnly
    createdAt
    updatedAt
  }
}

query ListWorkflowNodeDefinitions {
  workflowNodeDefinitions {
    raw
  }
}

mutation CreateWorkflow($input: CreateWorkflowInput!) {
  createWorkflow(input: $input) {
    workflow {
      id
      name
    }
    error {
      __typename
    }
  }
}

mutation RenameWorkflow($id: ID!, $name: String!) {
  renameWorkflow(id: $id, name: $name) {
    workflow {
      id
      name
    }
    error {
      __typename
      ... on OtherUserError {
        code
      }
    }
  }
}

mutation DeleteWorkflow($id: ID!) {
  deleteWorkflow(id: $id) {
    deletedId
    error {
      __typename
      ... on OtherUserError {
        code
      }
    }
  }
}

mutation GlobalizeWorkflow($id: ID!) {
  globalizeWorkflow(id: $id) {
    workflow {
      id
      name
      global
    }
    error {
      __typename
      ... on OtherUserError {
        code
      }
    }
  }
}

mutation LocalizeWorkflow($id: ID!) {
  localizeWorkflow(id: $id) {
    workflow {
      id
      name
      global
    }
    error {
      __typename
      ... on OtherUserError {
        code
      }
    }
  }
}

mutation RunActiveWorkflow($id: ID!, $input: RunActiveWorkflowInput!) {
  runActiveWorkflow(id: $id, input: $input) {
    error {
      __typename
    }
    task {
      id
    }
  }
}

mutation RunConvertWorkflow($id: ID!, $input: Blob!) {
  runConvertWorkflow(id: $id, input: $input) {
    error {
      __typename
    }
    output
  }
}

mutation ToggleWorkflow($id: ID!, $enabled: Boolean!) {
  toggleWorkflow(id: $id, enabled: $enabled) {
    error {
      __typename
    }
    workflow {
      id
      name
      kind
      enabled
    }
  }
}
