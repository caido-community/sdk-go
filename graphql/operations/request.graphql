# Requests - list and get proxied HTTP requests

query GetRequest($id: ID!) {
  request(id: $id) {
    id
    method
    host
    port
    path
    query
    isTls
    raw
    createdAt
    length
    fileExtension
    alteration
    source
    response {
      id
      statusCode
      raw
      roundtripTime
      length
      alteration
      createdAt
    }
  }
}

query GetRequestMetadata($id: ID!) {
  request(id: $id) {
    id
    method
    host
    port
    path
    query
    isTls
    createdAt
    length
    fileExtension
    alteration
    source
    response {
      id
      statusCode
