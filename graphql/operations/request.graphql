  }
}

query ListRequests(
  $first: Int
  $last: Int
  $after: String
  $before: String
  $filter: HTTPQL
  $order: RequestResponseOrderInput
  $scopeId: ID
) {
  requests(
    first: $first
    last: $last
    after: $after
    before: $before
    filter: $filter
    order: $order
    scopeId: $scopeId
  ) {
    edges {
      cursor
      node {
        id
        method
        host
        port
        path
        query
        isTls
        createdAt
        length
        fileExtension
        alteration
        source
        response {
          id
          statusCode
          roundtripTime
          length
          alteration
          createdAt
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    count {
      value
    }
  }
}

query ListRequestsByOffset(
  $limit: Int
  $offset: Int
  $filter: HTTPQL
